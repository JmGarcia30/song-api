spring.datasource.url=jdbc:postgresql://localhost:5432/db_songs
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update

# Specify the PostgreSQL dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Show the actual SQL queries generated by Hibernate in your console (helpful for debugging)
spring.jpa.show-sql=true

# Format the SQL queries in the console to make them easier to read
spring.jpa.properties.hibernate.format_sql=true